Model:
  backbone:
    name: PPLCNetV3
    scale: 0.95
  svtr:
    dims: 120
    depth: 2
    hidden_dims: 120
    kernel_size: [1, 3]
    use_guide: true
  num_classes: 11
  ofr_nhead: 4
  ofr_depth: 2
  T: 1000
  mask_ratio_max: 0.5
  span_len: 3
  pretrained: "data/checkpoints/release/ppocr_v5_paddle/best_accuracy.pdparams"

Loss:
  lambda_aux: 0.0
  beta_rec: 0.0
  blank_idx: 0

Train:
  epochs: 15
  batch_size: 32
  learning_rate: 5.0e-4
  weight_decay: 3.0e-5
  warmup_epochs: 5
  backbone_lr_ratio: 0.1
  data_dir: "data"
  label_file: "data/gt/rec/rec_gt_train.txt"
  image_shape: [3, 64, 256]
  max_text_length: 25
  num_workers: 4
  image_occlusion_mix:      # 5-mode image-space occlusion: top/bottom/left/right
                            # half-masking + random-pixel masking, random mode
                            # and severity per sample
    p: 0.5
    frac_range: [0.2, 0.5]

Eval:
  data_dir: "data"
  label_file: "data/gt/rec/rec_gt_val.txt"
  image_shape: [3, 64, 256]
  max_text_length: 25
  batch_size: 32
  num_workers: 4

Save:
  save_dir: "./outputs/dfrnet_occmask"
  save_epoch_step: 1
  eval_step: 50
