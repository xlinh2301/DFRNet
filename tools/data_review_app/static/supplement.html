<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>DATA_COCO Supplement from 100k</title>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <nav>
    <a href="/static/index.html">Review</a>
    <a href="/static/eval.html">Eval</a>
    <a href="/static/supplement.html" class="active">Supplement</a>
  </nav>

  <h1>Supplement from 100k candidates</h1>

  <div id="filters">
    <label>Min conf: <input id="minConf" type="number" step="0.01" min="0" max="1" /></label>
    <label>Max conf: <input id="maxConf" type="number" step="0.01" min="0" max="1" /></label>
    <label>Order:
      <select id="order">
        <option value="desc">High to low</option>
        <option value="asc">Low to high</option>
      </select>
    </label>
    <button id="applyFilters">Apply</button>
    <button id="stageBtn">Save selected to staging folder</button>
    <span id="selectedCount">0 selected</span>
  </div>

  <div id="pager">
    <button id="prevBtn">&laquo; Prev</button>
    <span id="pageInfo"></span>
    <button id="nextBtn">Next &raquo;</button>
  </div>

  <div id="grid" class="grid"></div>

  <script src="/static/supplement.js"></script>
</body>
</html>
